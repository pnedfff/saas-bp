<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店盈AI · 商业计划书</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #e2e8f0;
      color: #0f172a;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    /* ── 顶部导航栏 ── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 48px;
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
      z-index: 10;
    }

    #brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #brand-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #dc2626;
      box-shadow: 0 0 8px rgba(220,38,38,0.4);
    }

    #brand-name {
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: 1px;
    }

    #brand-sub {
      font-size: 12px;
      color: #94a3b8;
      margin-left: 4px;
    }

    #slide-title {
      font-size: 13px;
      color: #64748b;
      text-align: center;
      flex: 1;
      padding: 0 20px;
    }

    #page-counter {
      font-size: 14px;
      font-weight: 600;
      color: #dc2626;
      white-space: nowrap;
    }

    /* ── 主内容区 ── */
    #main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 12px 60px;
      overflow: hidden;
    }

    /* ── 幻灯片容器 ── */
    #slide-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    #slide-wrapper {
      position: relative;
      line-height: 0;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.06);
      transition: opacity 0.2s ease;
    }

    #slide-wrapper.transitioning {
      opacity: 0;
    }

    #current-svg {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }

    /* ── 翻页按钮 ── */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 80px;
      background: rgba(0,0,0,0.04);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      z-index: 20;
    }

    .nav-btn:hover {
      background: rgba(220,38,38,0.15);
      border-color: rgba(220,38,38,0.4);
    }

    .nav-btn:active {
      transform: translateY(-50%) scale(0.95);
    }

    .nav-btn.disabled {
      opacity: 0.2;
      cursor: default;
      pointer-events: none;
    }

    #btn-prev { left: 8px; }
    #btn-next { right: 8px; }

    .nav-btn svg {
      width: 20px;
      height: 20px;
      fill: #64748b;
      transition: fill 0.2s;
    }

    .nav-btn:hover svg { fill: #dc2626; }

    /* ── 底部进度条 ── */
    #bottombar {
      height: 36px;
      background: #ffffff;
      border-top: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      flex-shrink: 0;
    }

    #progress-track {
      flex: 1;
      height: 4px;
      background: #e2e8f0;
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }

    #progress-fill {
      height: 4px;
      background: linear-gradient(90deg, #dc2626, #f59e0b);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* 小圆点指示器 */
    #dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #cbd5e1;
      cursor: pointer;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .dot.active {
      background: #dc2626;
      box-shadow: 0 0 6px rgba(220,38,38,0.4);
      transform: scale(1.3);
    }

    .dot:hover:not(.active) {
      background: #94a3b8;
    }

    #hint {
      font-size: 11px;
      color: #94a3b8;
      white-space: nowrap;
    }

    /* ── 键盘提示 ── */
    #keyboard-hint {
      position: absolute;
      bottom: 50px;
      right: 80px;
      font-size: 11px;
      color: #94a3b8;
      display: flex;
      gap: 8px;
      align-items: center;
      pointer-events: none;
    }

    .key-badge {
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
      color: #64748b;
    }
  </style>
</head>
<body>

<!-- 顶部导航 -->
<div id="topbar">
  <div id="brand">
    <div id="brand-dot"></div>
    <span id="brand-name">店盈AI</span>
    <span id="brand-sub">商业计划书</span>
  </div>
  <div id="slide-title"></div>
  <div id="page-counter"></div>
</div>

<!-- 主内容 -->
<div id="main">
  <button class="nav-btn" id="btn-prev" onclick="prevSlide()" title="上一页">
    <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
  </button>

  <div id="slide-container">
    <div id="slide-wrapper">
      <img id="current-svg" alt="幻灯片" draggable="false"/>
    </div>
  </div>

  <button class="nav-btn" id="btn-next" onclick="nextSlide()" title="下一页">
    <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
  </button>
</div>

<!-- 底部进度条 -->
<div id="bottombar">
  <div id="dots"></div>
  <div id="progress-track" onclick="handleProgressClick(event)">
    <div id="progress-fill"></div>
  </div>
  <div id="hint">← → 翻页</div>
</div>

<script>
  const TOTAL = 12;

  const SLIDE_TITLES = [
    '封面 · 店盈AI',
    '痛点 · 真实日常',
    '市场验证 · 非伪需求',
    '解决方案 · 全链路闭环',
    '客户价值 · 精算ROI',
    '产品演示 · 核心功能',
    'AI能力 · 成本结构',
    '商业模式 · 定价方案',
    '竞争分析 · 差异化定位',
    '增长路径 · 三阶段规划',
    '团队 · 0号客户出发',
    '财务预测 · 融资计划',
  ];

  let current = 1;

  const img = document.getElementById('current-svg');
  const wrapper = document.getElementById('slide-wrapper');
  const titleEl = document.getElementById('slide-title');
  const counterEl = document.getElementById('page-counter');
  const fillEl = document.getElementById('progress-fill');
  const dotsEl = document.getElementById('dots');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');

  // 创建小圆点
  for (let i = 1; i <= TOTAL; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 1 ? ' active' : '');
    dot.title = SLIDE_TITLES[i - 1];
    dot.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(dot);
  }

  function getSvgPath(n) {
    const num = String(n).padStart(2, '0');
    return `../slides/slide-${num}.svg`;
  }

  function updateUI() {
    titleEl.textContent = SLIDE_TITLES[current - 1];
    counterEl.textContent = `${current} / ${TOTAL}`;

    const pct = ((current - 1) / (TOTAL - 1)) * 100;
    fillEl.style.width = pct + '%';

    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i + 1 === current);
    });

    btnPrev.classList.toggle('disabled', current === 1);
    btnNext.classList.toggle('disabled', current === TOTAL);
  }

  function goTo(n, animate = true) {
    if (n < 1 || n > TOTAL || n === current) return;

    if (animate) {
      wrapper.classList.add('transitioning');
      setTimeout(() => {
        current = n;
        img.src = getSvgPath(n);
        updateUI();
        wrapper.classList.remove('transitioning');
      }, 180);
    } else {
      current = n;
      img.src = getSvgPath(n);
      updateUI();
    }
  }

  function prevSlide() { goTo(current - 1); }
  function nextSlide() { goTo(current + 1); }

  function handleProgressClick(e) {
    const rect = e.currentTarget.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    const page = Math.max(1, Math.min(TOTAL, Math.round(ratio * (TOTAL - 1)) + 1));
    goTo(page);
  }

  // 键盘控制
  document.addEventListener('keydown', (e) => {
    switch (e.key) {
      case 'ArrowLeft':
      case 'ArrowUp':
        e.preventDefault();
        prevSlide();
        break;
      case 'ArrowRight':
      case 'ArrowDown':
      case ' ':
        e.preventDefault();
        nextSlide();
        break;
      case 'Home':
        e.preventDefault();
        goTo(1);
        break;
      case 'End':
        e.preventDefault();
        goTo(TOTAL);
        break;
      default:
        // 数字键 1-9
        if (e.key >= '1' && e.key <= '9') {
          goTo(parseInt(e.key));
        }
        break;
    }
  });

  // 触摸/滑动支持
  let touchStartX = 0;
  document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 60) {
      if (dx < 0) nextSlide();
      else prevSlide();
    }
  }, { passive: true });

  // SVG按实际尺寸自适应视口
  function resizeSVG() {
    const main = document.getElementById('main');
    const availW = main.clientWidth - 120; // 减去左右按钮
    const availH = main.clientHeight - 24;
    const ratio = 1280 / 720;
    let w = availW;
    let h = w / ratio;
    if (h > availH) {
      h = availH;
      w = h * ratio;
    }
    img.style.width = w + 'px';
    img.style.height = h + 'px';
  }

  window.addEventListener('resize', resizeSVG);

  // 初始化
  img.src = getSvgPath(1);
  updateUI();
  img.onload = resizeSVG;
  resizeSVG();
</script>
</body>
</html>
