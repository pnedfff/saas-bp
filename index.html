  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店盈AI · 商业计划书</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #e2e8f0;
      color: #0f172a;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    /* ── 顶部导航栏 ── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 48px;
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
      z-index: 10;
    }

    #brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #brand-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #dc2626;
      box-shadow: 0 0 8px rgba(220,38,38,0.4);
    }

    #brand-name {
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: 1px;
    }

    #brand-sub {
      font-size: 12px;
      color: #94a3b8;
      margin-left: 4px;
    }

    #slide-title {
      font-size: 13px;
      color: #64748b;
      text-align: center;
      flex: 1;
      padding: 0 20px;
    }

    #page-counter {
      font-size: 14px;
      font-weight: 600;
      color: #dc2626;
      white-space: nowrap;
    }

    /* ── 主内容区 ── */
    #main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 12px 60px;
      overflow: hidden;
    }

    /* ── 幻灯片容器 ── */
    #slide-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    #slide-wrapper {
      position: relative;
      line-height: 0;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.06);
      transition: opacity 0.2s ease;
    }

    #slide-wrapper.transitioning {
      opacity: 0;
    }

    #current-svg {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }

    /* ── 翻页按钮 ── */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 80px;
      background: rgba(0,0,0,0.04);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      z-index: 20;
    }

    .nav-btn:hover {
      background: rgba(220,38,38,0.15);
      border-color: rgba(220,38,38,0.4);
    }

    .nav-btn:active {
      transform: translateY(-50%) scale(0.95);
    }

    .nav-btn.disabled {
      opacity: 0.2;
      cursor: default;
      pointer-events: none;
    }

    #btn-prev { left: 8px; }
    #btn-next { right: 8px; }

    .nav-btn svg {
      width: 20px;
      height: 20px;
      fill: #64748b;
      transition: fill 0.2s;
    }

    .nav-btn:hover svg { fill: #dc2626; }

    /* ── 底部进度条 ── */
    #bottombar {
      height: 36px;
      background: #ffffff;
      border-top: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      flex-shrink: 0;
    }

    #progress-track {
      flex: 1;
      height: 4px;
      background: #e2e8f0;
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }

    #progress-fill {
      height: 4px;
      background: linear-gradient(90deg, #dc2626, #f59e0b);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* 小圆点指示器 */
    #dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #cbd5e1;
      cursor: pointer;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .dot.active {
      background: #dc2626;
      box-shadow: 0 0 6px rgba(220,38,38,0.4);
      transform: scale(1.3);
    }

    .dot:hover:not(.active) {
      background: #94a3b8;
    }

    #hint {
      font-size: 11px;
      color: #94a3b8;
      white-space: nowrap;
    }

    /* ── 键盘提示 ── */
    #keyboard-hint {
      position: absolute;
      bottom: 50px;
      right: 80px;
      font-size: 11px;
      color: #94a3b8;
      display: flex;
      gap: 8px;
      align-items: center;
      pointer-events: none;
    }

    .key-badge {
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
      color: #64748b;
    }

    /* Demo 覆盖按钮（第6页产品演示）— 完整 HTML 按钮，随幻灯片缩放 */
    #demo-btn {
      display: none;
      position: absolute;
      bottom: 5%;
      left: 3%;
      width: 38%;
      height: 7%;
      border-radius: 999px;
      background: #dc2626;
      box-shadow: 0 4px 16px rgba(220,38,38,0.35);
      text-decoration: none;
      cursor: pointer;
      z-index: 30;
      align-items: center;
      justify-content: flex-start;
      padding: 0 3%;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: clamp(10px, 1.2vw, 15px);
      font-weight: 700;
      color: #ffffff;
      gap: 0.8em;
      transition: background 0.15s;
    }
    #demo-btn:hover {
      background: #b91c1c;
    }
    #demo-btn .demo-url {
      font-weight: 400;
      opacity: 0.85;
      font-size: 0.88em;
    }
    #demo-btn .demo-arrow {
      margin-left: auto;
      opacity: 0.7;
    }
    #demo-btn.visible {
      display: flex;
    }
  </style>
</head>
<body>

      <img id="current-svg" alt="幻灯片" draggable="false"/>
      <!-- 第6页 Demo 可点击覆盖按钮 -->
      <a id="demo-btn" href="https://bp.1pro.men/demo" target="_blank" rel="noopener"
         title="访问真实门店演示系统">

<div id="bottombar">
  <div id="dots"></div>
  <div id="progress-track" onclick="handleProgressClick(event)">
    <div id="progress-fill"></div>
  </div>
  <div id="hint">← → 翻页</div>
</div>

<script>
  const TOTAL = 12;

  const SLIDE_TITLES = [
    '封面 · 店盈AI',
    '痛点 · 真实日常',
    '市场验证 · 非伪需求',
    '解决方案 · 全链路闭环',
    '客户价值 · 精算ROI',
    '产品演示 · 核心功能',
    'AI能力 · 成本结构',
    '商业模式 · 定价方案',
    '竞争分析 · 差异化定位',
    '增长路径 · 三阶段规划',
    '团队 · 0号客户出发',
    '财务预测 · 融资计划',
  ];

  let current = 1;

  const img = document.getElementById('current-svg');
  const wrapper = document.getElementById('slide-wrapper');
  const titleEl = document.getElementById('slide-title');
  const counterEl = document.getElementById('page-counter');
  const fillEl = document.getElementById('progress-fill');
  const dotsEl = document.getElementById('dots');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  const demoBtn = document.getElementById('demo-btn');
  const DEMO_SLIDE = 6; // 产品演示页

  // 创建小圆点
  for (let i = 1; i <= TOTAL; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 1 ? ' active' : '');
    dot.title = SLIDE_TITLES[i - 1];
    dot.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(dot);
  }

  function getSvgPath(n) {
    const num = String(n).padStart(2, '0');
    return `slides/slide-${num}.svg`;
  }

  function updateUI() {
    titleEl.textContent = SLIDE_TITLES[current - 1];
    counterEl.textContent = `${current} / ${TOTAL}`;

    const pct = ((current - 1) / (TOTAL - 1)) * 100;
    fillEl.style.width = pct + '%';

    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i + 1 === current);
    });

    btnPrev.classList.toggle('disabled', current === 1);
    btnNext.classList.toggle('disabled', current === TOTAL);

    // Demo 按钮只在第6页显示
    demoBtn.classList.toggle('visible', current === DEMO_SLIDE);
  }

  function goTo(n, animate = true) {
    if (n < 1 || n > TOTAL || n === current) return;

    if (animate) {
      wrapper.classList.add('transitioning');
      setTimeout(() => {
        current = n;
        img.src = getSvgPath(n);
        updateUI();
        wrapper.classList.remove('transitioning');
      }, 180);
    } else {
      current = n;
      img.src = getSvgPath(n);
      updateUI();
    }
  }

  function prevSlide() { goTo(current - 1); }
  function nextSlide() { goTo(current + 1); }

  function handleProgressClick(e) {
    const rect = e.currentTarget.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    const page = Math.max(1, Math.min(TOTAL, Math.round(ratio * (TOTAL - 1)) + 1));
    goTo(page);
  }

  // 键盘控制
  document.addEventListener('keydown', (e) => {
    switch (e.key) {
      case 'ArrowLeft':
      case 'ArrowUp':
        e.preventDefault();
        prevSlide();
        break;
      case 'ArrowRight':
      case 'ArrowDown':
      case ' ':
        e.preventDefault();
        nextSlide();
        break;
      case 'Home':
        e.preventDefault();
        goTo(1);
        break;
      case 'End':
        e.preventDefault();
        goTo(TOTAL);
        break;
      default:
        // 数字键 1-9
        if (e.key >= '1' && e.key <= '9') {
          goTo(parseInt(e.key));
        }
        break;
    }
  });

  // 触摸/滑动支持
  let touchStartX = 0;
  document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 60) {
      if (dx < 0) nextSlide();
      else prevSlide();
    }
  }, { passive: true });

  // SVG按实际尺寸自适应视口
  function resizeSVG() {
    const main = document.getElementById('main');
    const availW = main.clientWidth - 120; // 减去左右按钮
    const availH = main.clientHeight - 24;
    const ratio = 1280 / 720;
    let w = availW;
    let h = w / ratio;
    if (h > availH) {
      h = availH;
      w = h * ratio;
    }
    img.style.width = w + 'px';
    img.style.height = h + 'px';
  }

  window.addEventListener('resize', resizeSVG);

  // 初始化
  img.src = getSvgPath(1);
  updateUI();
  img.onload = resizeSVG;
  resizeSVG();
</script>
</body>
</html>
