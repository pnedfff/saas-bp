  <text x="800" y="485" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" fill="#ffffff">钉钉 / 飞书 →</text>
  <text x="940" y="485" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" fill="#94a3b8">店长不下载自家 app</text>

  <text x="800" y="510" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" fill="#ffffff">有赞 / 微盟 →</text>
  <text x="940" y="510" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" fill="#94a3b8">没做对话式 UI</text>

  <text x="800" y="535" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" fill="#ffffff">大模型公司 →</text>
  <text x="940" y="535" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" fill="#94a3b8">无垂直场景闭环</text>

  <text x="800" y="560" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" fill="#ffffff">非官方桥接初创 →</text>
  <text x="940" y="560" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" fill="#94a3b8">协议风险随时封号</text>

  <line x1="800" y1="580" x2="1200" y2="580" stroke="#334155" stroke-width="1"/>

  <text x="800" y="606" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="12" fill="#94a3b8">我们 = 三件套合法 stack 唯一玩家</text>
  <text x="800" y="628" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" fill="#f59e0b" font-weight="700">官方 Bot + Hermes Agent + 数据飞轮</text>

  <!-- 底部页脚 -->
  <text x="60" y="703" font-family="system-ui,-apple-system" font-size="12" fill="#94a3b8">店盈AI · 商业计划书 2026 · 第16页</text>
  <text x="1220" y="703" font-family="system-ui,-apple-system" font-size="12" fill="#94a3b8" text-anchor="end">16 / 16</text>
