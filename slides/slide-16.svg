  <text x="60" y="60" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" fill="#94a3b8" font-weight="700" letter-spacing="3">DELIVERY ARCHITECTURE · 深度展开</text>
