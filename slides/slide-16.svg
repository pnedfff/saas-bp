  <text x="812" y="308" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="12" fill="#475569">✅ 已通过，本周完成 3/5</text>

  <rect x="800" y="328" width="400" height="32" rx="6" fill="#f1f5f9"/>
