  <text x="410" y="308" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="12" fill="#16a34a" text-anchor="middle" font-weight="700">WECHAT 官方 BOT · 合规零封号</text>
  <text x="410" y="328" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">总店 WeChat Bot（命令中心）</text>

