  <text x="660" y="548" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">拍照 / 汇报</text>

  <!-- 闭环回路 -->
  <path d="M 660 510 Q 730 350 720 240 Q 700 180 540 198" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="540,198 552,194 552,202" fill="#16a34a"/>
  <text x="730" y="430" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="12" fill="#16a34a" font-weight="700">审核通过</text>
