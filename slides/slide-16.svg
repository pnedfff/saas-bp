  <text x="160" y="530" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="12" fill="#0284c7" text-anchor="middle">店长 1 微信</text>
  <text x="160" y="548" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">扫码即绑定</text>

  <rect x="240" y="510" width="120" height="50" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="300" y="530" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="12" fill="#0284c7" text-anchor="middle">店长 2 微信</text>
  <text x="300" y="548" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">扫码即绑定</text>

  <rect x="380" y="510" width="60" height="50" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="410" y="540" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="14" fill="#0284c7" text-anchor="middle" font-weight="700">···</text>

  <rect x="460" y="510" width="120" height="50" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="520" y="530" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="12" fill="#0284c7" text-anchor="middle">店长 N 微信</text>
  <text x="520" y="548" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">扫码即绑定</text>

