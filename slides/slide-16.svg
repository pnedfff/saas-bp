  <text x="60" y="128" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="14" fill="#64748b">官方微信 Bot + AI 大脑 = 店长零摩擦闭环 — 投资人想看技术细节就翻这页</text>

