<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f8fafc"/>
  <rect width="1280" height="4" fill="#dc2626"/>

  <!-- 顶部标题 -->
  <text x="60" y="60" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" fill="#94a3b8" font-weight="700" letter-spacing="3">TECHNICAL ARCHITECTURE</text>
  <text x="60" y="100" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="32" font-weight="900" fill="#0f172a">技术路径 · 三层架构</text>
  <text x="60" y="128" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="14" fill="#64748b">不只用 AI 做产品，更让产品本身就是 AI。三层架构 = 速度、价值、护城河</text>

  <!-- 三层卡片 -->

  <!-- 层 1：AI 原生开发 -->
  <rect x="60" y="170" width="380" height="430" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="60" y="170" width="380" height="6" rx="3" fill="#0284c7"/>
  <text x="80" y="208" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" font-weight="700" fill="#0284c7" letter-spacing="2">LAYER 1 · BUILD-TIME</text>
  <text x="80" y="240" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="22" font-weight="900" fill="#0f172a">AI 原生开发</text>
  <text x="80" y="266" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" fill="#64748b">建设期成本优势</text>

  <line x1="80" y1="285" x2="420" y2="285" stroke="#e2e8f0" stroke-width="1"/>

  <text x="80" y="318" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" font-weight="700" fill="#0f172a">技术栈</text>
  <text x="80" y="342" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="12" fill="#475569">● Claude Code + Cursor + Codex</text>
  <text x="80" y="362" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="12" fill="#475569">● Specs-driven development</text>
  <text x="80" y="382" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="12" fill="#475569">● 60% 代码 AI 生成 + 40% 架构审核</text>

  <text x="80" y="420" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" font-weight="700" fill="#0f172a">关键数字</text>
  <rect x="80" y="435" width="340" height="60" rx="6" fill="#eff6ff"/>
  <text x="100" y="465" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="24" font-weight="900" fill="#0284c7">2 人 = 6 人速度</text>
  <text x="100" y="485" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="11" fill="#64748b">3 个月 MVP · 全栈成本 ≤ 30 万</text>

  <text x="80" y="525" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" font-weight="700" fill="#0f172a">投资人答疑</text>
  <text x="80" y="548" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="11" fill="#64748b">"AI 工具 = 速度，但单速度不是护城河。</text>
  <text x="80" y="566" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="11" fill="#64748b">资金效率高 = 我们用 30 万跑通,</text>
  <text x="80" y="584" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="11" fill="#64748b">对手要花 200 万试错。"</text>

  <!-- 层 2：AI 原生产品 -->
  <rect x="450" y="170" width="380" height="430" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="450" y="170" width="380" height="6" rx="3" fill="#dc2626"/>
  <text x="470" y="208" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" font-weight="700" fill="#dc2626" letter-spacing="2">LAYER 2 · RUN-TIME</text>
  <text x="470" y="240" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="22" font-weight="900" fill="#0f172a">AI 原生产品</text>
  <text x="470" y="266" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" fill="#64748b">运行期付费理由</text>

  <line x1="470" y1="285" x2="810" y2="285" stroke="#e2e8f0" stroke-width="1"/>

  <text x="470" y="318" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" font-weight="700" fill="#0f172a">产品里的 AI 在干什么</text>
  <text x="470" y="342" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="12" fill="#475569">● 素材 AI 生成（海报/文案/短视频）</text>
  <text x="470" y="362" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="12" fill="#475569">● 任务智能派发（按店员能力/负载）</text>
  <text x="470" y="382" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="12" fill="#475569">● 验收照片 AI 审核</text>
  <text x="470" y="402" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="12" fill="#475569">● 周报自动生成 + 改进建议</text>

  <text x="470" y="438" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" font-weight="700" fill="#0f172a">关键数字</text>
  <rect x="470" y="453" width="340" height="60" rx="6" fill="#fef2f2"/>
  <text x="490" y="483" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="24" font-weight="900" fill="#dc2626">单店每月省 4 小时</text>
  <text x="490" y="503" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="11" fill="#64748b">¥8000/年订阅有了硬支撑 · ROI 正向</text>

  <text x="470" y="540" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" font-weight="700" fill="#0f172a">独家优势</text>
  <text x="470" y="563" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="11" fill="#64748b">WeChat 官方 Bot + Hermes Agent</text>
  <text x="470" y="581" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="11" fill="#64748b">国内中小连锁场景唯一合规方案</text>

  <!-- 层 3：数据护城河 -->
  <rect x="840" y="170" width="380" height="430" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="840" y="170" width="380" height="6" rx="3" fill="#f59e0b"/>
  <text x="860" y="208" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" font-weight="700" fill="#f59e0b" letter-spacing="2">LAYER 3 · DATA MOAT</text>
  <text x="860" y="240" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="22" font-weight="900" fill="#0f172a">数据飞轮</text>
  <text x="860" y="266" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" fill="#64748b">长期不可复制壁垒</text>

  <line x1="860" y1="285" x2="1200" y2="285" stroke="#e2e8f0" stroke-width="1"/>

  <text x="860" y="318" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" font-weight="700" fill="#0f172a">沉淀什么</text>
  <text x="860" y="342" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="12" fill="#475569">● 门店画像（地理 × 客群 × 品类）</text>
  <text x="860" y="362" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="12" fill="#475569">● 素材 × 客群 × 表现 三元矩阵</text>
  <text x="860" y="382" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="12" fill="#475569">● 跨客户匿名联邦学习（合规）</text>

  <text x="860" y="420" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" font-weight="700" fill="#0f172a">关键数字</text>
  <rect x="860" y="435" width="340" height="60" rx="6" fill="#fffbeb"/>
  <text x="880" y="465" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="22" font-weight="900" fill="#f59e0b">72,000 样本/年</text>
  <text x="880" y="485" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="11" fill="#64748b">100 客户 × 60 店 × 12 月</text>

  <text x="860" y="525" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" font-weight="700" fill="#0f172a">复利效应</text>
  <text x="860" y="548" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="11" fill="#64748b">第 2 年起 AI 推荐准确率每季 +5%</text>
  <text x="860" y="566" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="11" fill="#64748b">后来者团队再大、AI 工具一样,</text>
  <text x="860" y="584" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="11" fill="#475569" font-weight="700">3 年内追不上数据飞轮</text>

  <!-- 底部三件套总结条 -->
  <rect x="60" y="630" width="1160" height="50" rx="8" fill="#0f172a"/>
  <text x="84" y="660" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" fill="#94a3b8" font-weight="700">核心论点 →</text>
  <text x="200" y="660" font-family="system-ui,-apple-system,PingFang SC,Microsoft YaHei,sans-serif" font-size="14" fill="#ffffff" font-weight="700">三层叠加 = 18-24 个月不可压缩窗口期，足够跑到 1000 客户</text>

  <!-- 底部页脚 -->
  <text x="60" y="703" font-family="system-ui,-apple-system" font-size="12" fill="#94a3b8">店盈AI · 商业计划书 2026 · 第15页</text>
  <text x="1220" y="703" font-family="system-ui,-apple-system" font-size="12" fill="#94a3b8" text-anchor="end">15 / 16</text>
</svg>
